camera/horizontal_fov: 130.0
camera/vertical_fov: 20.0

raycast/dr:     0.2
raycast/dphi:   4
raycast/dtheta: 10

system/bbx/r: 0.75
system/bbx/overshoot: 0.25

aep/gain/r_min: 0.1
aep/gain/r_max: 20
aep/gain/zero: 0.05
aep/gain/lambda: 0.1
aep/gain/sigma_thresh: 0.2
aep/tree/extension_range: 0.75
aep/tree/max_sampling_radius: 10
aep/tree/initial_iterations: 150
aep/tree/cutoff_iterations: 300

rrt/min_nodes: 100

# bounding box: necessary to limit the simulation 
# scenario (smaller than actual gazebo scenario)
boundary/min: [-30.0, -30.0, -30.0]
boundary/max: [ 30.0,  30.0, 20.0]

visualize_rays: true
visualize_tree: true
visualize_exploration_area: true

robot_frame: "base_link"
world_frame: "map"
sensor_frame: "sonar_link"

# BGKLOctoMap parameters — matching bgkloctomap_large_map.yaml
resolution: 0.2
block_depth: 5
sf2: 1.0
ell: 0.6
free_resolution: 0.4
ds_resolution: 0.2
free_thresh: 0.3
occupied_thresh: 0.7
prior_A: 0.001
prior_B: 0.001
var_thresh: 100.0
min_z: -50.0
max_z: 50.0
free_ray_range_weight: false
tau_var: 0.01
tau_info: 0.5
use_pose_level_weighting: false
pose_history_size: 20
pose_novelty_sigma: 0.3
pose_w_roll: 1.0
pose_w_pitch: 0.6
pose_w_yaw: 0.05
pose_w_vx_per_l2: 0.2
pose_w_vy_per_l2: 0.05
pose_w_vz_per_l2: 0.5

