camera/horizontal_fov: 130.0
camera/vertical_fov: 20.0

raycast/dr:     0.1
raycast/dphi:   10
raycast/dtheta: 10

system/bbx/r: 0.75
system/bbx/overshoot: 0.25

aep/gain/r_min: 0.1
aep/gain/r_max: 40
aep/gain/zero: 25
aep/gain/lambda: 0.75
aep/gain/sigma_thresh: 0.2
aep/tree/extension_range: 1
aep/tree/max_sampling_radius: 10
aep/tree/initial_iterations: 15
aep/tree/cutoff_iterations: 30

rrt/min_nodes: 100

# bounding box: necessary to limit the simulation 
# scenario (smaller than actual gazebo scenario)
boundary/min: [-5.0, -5.0, -5.0]
boundary/max: [ 5.0,  5.0, 5.0]

visualize_rays: false
visualize_tree: true
visualize_exploration_area: true

robot_frame: "base_link"
world_frame: "map"

